# SonarQube Scanner configuration - importre microservices
# Para uso local com sonar-scanner CLI ou SonarQube/SonarCloud.
# Como o projeto e Node.js puro (sem build), usamos sonar-scanner diretamente.

sonar.projectKey=importre-microservices
sonar.projectName=importre-microservices
sonar.projectVersion=2.0.0

# Diretorio base do projeto
sonar.sources=services,orchestrator,shared,tools
sonar.exclusions=**/node_modules/**,**/*.html,**/*.css,config/**,_debug_*.js,_tmp_*.ps1,tests/**

# Linguagem
sonar.language=js

# Cobertura (placeholder - sem testes instrumentados por enquanto)
sonar.coverage.exclusions=**/node_modules/**,tests/**,tools/**

# Encoding
sonar.sourceEncoding=UTF-8

# Para SonarCloud (descomente e configure se for usar):
# sonar.host.url=https://sonarcloud.io
# sonar.organization=your-org
# sonar.login=YOUR_TOKEN
