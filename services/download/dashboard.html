<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Downloads</title>
<link rel="stylesheet" href="https://unpkg.com/antd@5.20.0/dist/reset.css">
<link rel="stylesheet" href="https://unpkg.com/antd@5.20.0/dist/antd.min.css">
<style>
  body { background: #0d1117; color: #c9d1d9; padding: 12px; }
  .site-card { background: #161b22; border-color: #30363d; }
  .site-card .ant-card-head { background: #161b22; border-color: #30363d; color: #e94560; }
  .site-card .ant-card-body { background: #161b22; }
  .stat-value { color: #58a6ff; font-weight: 700; }
  .stat-ok { color: #3fb950; }
  .stat-fail { color: #e94560; }
</style>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/antd@5.20.0/dist/antd.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const { Card, Table, Tag, Space, Statistic, Row, Col, Progress } = antd;

async function fetchJSON(url) {
  try {
    const r = await fetch(url);
    return await r.json();
  } catch (e) { return {}; }
}

function formatSpeed(s) {
  if (!s) return '-';
  return s;
}

function App() {
  const [status, setStatus] = useState({ active: 0, completed: 0, failed: 0 });
  const [items, setItems] = useState([]);

  useEffect(() => {
    async function load() {
      const s = await fetchJSON('/status');
      setStatus(s);
      const q = await fetchJSON('/queue-proxy');
      const downloading = (q.queue || []).filter(i => i.status === 'downloading' || i.status === 'ready').slice(0, 50);
      setItems(downloading);
    }
    load();
    const i = setInterval(load, 3000);
    return () => clearInterval(i);
  }, []);

  const columns = [
    { title: 'Serial', dataIndex: 'serial', key: 'serial', render: s => <Tag color="blue">{s}</Tag> },
    { title: 'Jogo', dataIndex: 'title', key: 'title', ellipsis: true },
    { title: 'Origem', key: 'source', render: (_, item) => {
      const src = (item.sources || [])[0] || {};
      return <Tag color="purple">{src.site || '-'}</Tag>;
    }},
    { title: 'Progresso', key: 'progress', render: (_, item) => {
      const p = item.progress || {};
      const pct = p.percent || 0;
      return <Progress percent={pct} size="small" status={pct >= 100 ? 'success' : 'active'} />;
    }},
    { title: 'Velocidade', key: 'speed', render: (_, item) => {
      const p = item.progress || {};
      return <span>{formatSpeed(p.speed)}</span>;
    }},
    { title: 'Retry', dataIndex: 'retry_count', key: 'retry', render: r => r || 0 },
  ];

  return (
    <Card title={`Downloads ativos: ${status.active || 0}`} className="site-card" bordered>
      <Row gutter={16} style={{ marginBottom: 16 }}>
        <Col><Statistic title="Ativos" value={status.active || 0} valueStyle={{ color: '#58a6ff' }} /></Col>
        <Col><Statistic title="OK" value={status.completed || 0} valueStyle={{ color: '#3fb950' }} /></Col>
        <Col><Statistic title="Falhas" value={status.failed || 0} valueStyle={{ color: '#e94560' }} /></Col>
      </Row>
      <Table
        dataSource={items}
        columns={columns}
        rowKey="serial"
        size="small"
        pagination={false}
        scroll={{ y: 320 }}
        locale={{ emptyText: 'nenhum download ativo' }}
      />
    </Card>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
