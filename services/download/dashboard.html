<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="/shared/dashboard.css">
<style>
.site-table{width:100%;border-collapse:collapse}
.site-table th,.site-table td{padding:6px 10px;text-align:left;border-bottom:1px solid var(--bg3);font-size:12px}
.site-table th{background:var(--bg3);color:var(--txt2);text-transform:uppercase;font-size:10px;position:sticky;top:0}
.site-table tr:hover{background:var(--bg3)}
.bar-wrap{position:relative;background:var(--bg3);border-radius:4px;height:20px;overflow:hidden;min-width:120px}
.bar-fill{position:absolute;top:0;left:0;height:100%;background:linear-gradient(90deg,var(--purple),var(--blue));opacity:.5}
.bar-text{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;height:100%;font-size:10px;font-weight:700;color:var(--txt)}
.speed{color:var(--purple);font-weight:700;font-size:11px}
.source{color:var(--orange);font-weight:700;font-size:11px}
</style>
</head>
<body>
<div class="widget">
  <div class="widget-header">Downloads <span id="h-cnt"></span></div>
  <div class="widget-body">
    <div class="stat-grid" id="stats"></div>
    <div id="table"></div>
  </div>
</div>
<script src="/shared/dashboard.js"></script>
<script>
async function render(){
  const data = await Dashboard.fetchJSON('/status');
  document.getElementById('h-cnt').innerHTML = Dashboard.badge(data.active||0);
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="n">${data.active||0}</div><div class="l">Ativos</div></div>
    <div class="stat"><div class="n" style="color:var(--green)">${data.completed||0}</div><div class="l">OK</div></div>
    <div class="stat"><div class="n" style="color:#f44336">${data.failed||0}</div><div class="l">Falhas</div></div>
  `;

  const q = await Dashboard.fetchJSON('/queue-proxy');
  const items = (q.queue||[]).filter(i=>i.status==='downloading').slice(0,50);
  const table = document.getElementById('table');
  if(!items.length){ table.innerHTML='<p class="muted">nenhum download ativo</p>'; return; }
  table.innerHTML = `<table class="site-table"><tr><th>Serial</th><th>Jogo</th><th>Origem</th><th>Progresso</th><th>Velocidade</th></tr>`+
    items.map(i=>{
      const src = (i.sources||[])[0]||{};
      const p = i.progress || {};
      const pct = p.percent || 0;
      const bar = `<div class="bar-wrap"><div class="bar-fill" style="width:${pct}%"></div><div class="bar-text">${pct}%</div></div>`;
      return `<tr><td>${Dashboard.esc(i.serial)}</td><td>${Dashboard.esc(i.title||'-')}</td><td class="source">${Dashboard.esc(src.site||'-')}</td><td>${bar}</td><td class="speed">${Dashboard.esc(p.speed||'-')}</td></tr>`;
    }).join('')+
    `</table>`;
}
render(); setInterval(render,3000);
</script>
</body>
</html>
