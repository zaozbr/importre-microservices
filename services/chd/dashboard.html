<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="/shared/dashboard.css">
<style>
.site-table{width:100%;border-collapse:collapse}
.site-table th,.site-table td{padding:5px 8px;text-align:left;border-bottom:1px solid var(--bg3);font-size:11px}
.site-table th{background:var(--bg3);color:var(--txt2);text-transform:uppercase;font-size:9px;position:sticky;top:0}
.site-table tr:hover{background:var(--bg3)}
</style>
</head>
<body>
<div class="widget">
  <div class="widget-body">
    <div class="stat-grid" id="stats"></div>
    <div id="table"></div>
  </div>
</div>
<script src="/shared/dashboard.js"></script>
<script>
async function render(){
  const data = await Dashboard.fetchJSON('/status');
  const conv = data.converting||[];
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="n">${data.ready||0}</div><div class="l">Prontos</div></div>
    <div class="stat"><div class="n" style="color:var(--purple)">${conv.length}</div><div class="l">Ativos</div></div>
    <div class="stat"><div class="n" style="color:var(--green)">${data.completed||0}</div><div class="l">OK</div></div>
    <div class="stat"><div class="n" style="color:#f44336">${data.failed||0}</div><div class="l">Falhas</div></div>
  `;
  const table = document.getElementById('table');
  if(!conv.length){ table.innerHTML='<p class="muted">nenhuma conversão ativa</p>'; return; }
  table.innerHTML = `<table class="site-table"><tr><th>Serial</th><th>Arquivo</th></tr>`+
    conv.map(c=>`<tr><td>${Dashboard.esc(c.serial||'-')}</td><td class="muted">${Dashboard.esc(c.file||'-')}</td></tr>`).join('')+
    `</table>`;
}
render(); setInterval(render,3000);
</script>
</body>
</html>
