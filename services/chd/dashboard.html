<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conversão CHD</title>
<link rel="stylesheet" href="https://unpkg.com/antd@5.20.0/dist/reset.css">
<link rel="stylesheet" href="https://unpkg.com/antd@5.20.0/dist/antd.min.css">
<style>
  body { background: #0d1117; color: #c9d1d9; padding: 12px; }
  .site-card { background: #161b22; border-color: #30363d; }
  .site-card .ant-card-head { background: #161b22; border-color: #30363d; color: #e94560; }
  .site-card .ant-card-body { background: #161b22; }
</style>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/antd@5.20.0/dist/antd.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const { Card, Table, Tag, Statistic, Row, Col } = antd;

async function fetchJSON(url) {
  try { const r = await fetch(url); return await r.json(); } catch (e) { return {}; }
}

function App() {
  const [status, setStatus] = useState({ ready: 0, converting: [], completed: 0, failed: 0 });

  useEffect(() => {
    async function load() {
      const s = await fetchJSON('/status');
      setStatus(s);
    }
    load();
    const i = setInterval(load, 3000);
    return () => clearInterval(i);
  }, []);

  const columns = [
    { title: 'Serial', dataIndex: 'serial', key: 'serial', render: s => <Tag color="blue">{s || '-'}</Tag> },
    { title: 'Arquivo', dataIndex: 'file', key: 'file', ellipsis: true },
  ];

  return (
    <Card title={`Conversão CHD: ${(status.converting || []).length} ativas`} className="site-card" bordered>
      <Row gutter={16} style={{ marginBottom: 16 }}>
        <Col><Statistic title="Prontos" value={status.ready || 0} valueStyle={{ color: '#58a6ff' }} /></Col>
        <Col><Statistic title="Ativos" value={(status.converting || []).length} valueStyle={{ color: '#bc8cff' }} /></Col>
        <Col><Statistic title="OK" value={status.completed || 0} valueStyle={{ color: '#3fb950' }} /></Col>
        <Col><Statistic title="Falhas" value={status.failed || 0} valueStyle={{ color: '#e94560' }} /></Col>
      </Row>
      <Table
        dataSource={status.converting || []}
        columns={columns}
        rowKey="serial"
        size="small"
        pagination={false}
        scroll={{ y: 320 }}
        locale={{ emptyText: 'nenhuma conversão ativa' }}
      />
    </Card>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
