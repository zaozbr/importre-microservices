<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="/shared/dashboard.css">
<style>
.site-table{width:100%;border-collapse:collapse}
.site-table th,.site-table td{padding:5px 8px;text-align:left;border-bottom:1px solid var(--bg3);font-size:11px}
.site-table th{background:var(--bg3);color:var(--txt2);text-transform:uppercase;font-size:9px;position:sticky;top:0}
.site-table tr:hover{background:var(--bg3)}
.bar-wrap{position:relative;background:var(--bg3);border-radius:4px;height:18px;overflow:hidden;min-width:100px}
.bar-fill{position:absolute;top:0;left:0;height:100%;background:linear-gradient(90deg,var(--purple),var(--blue));opacity:.5}
.bar-text{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;height:100%;font-size:9px;font-weight:700;color:var(--txt)}
</style>
</head>
<body>
<div class="widget">
  <div class="widget-body">
    <div id="table"></div>
  </div>
</div>
<script src="/shared/dashboard.js"></script>
<script>
function statusBar(i){
  const p = i.progress || {};
  const pct = p.percent || 0;
  if(i.status==='downloading'){
    return `<div class="bar-wrap"><div class="bar-fill" style="width:${pct}%"></div><div class="bar-text">${i.status} ${pct}%</div></div>`;
  }
  return `<span class="status ${i.status}">${i.status}</span>`;
}
async function render(){
  const data = await Dashboard.fetchJSON('/status');

  const q = await Dashboard.fetchJSON('/queue');
  const items = (q.queue||[]).filter(i=>['pending','searching','ready','downloading'].includes(i.status))
    .sort((a,b)=>{
      // Downloads ativos primeiro, ordenados por % (maior primeiro)
      const pa=((a.progress||{}).percent||0), pb=((b.progress||{}).percent||0);
      if(a.status==='downloading'&&b.status==='downloading') return pb-pa;
      if(a.status==='downloading') return -1;
      if(b.status==='downloading') return 1;
      return (b.priority||0)-(a.priority||0);
    })
    .slice(0,50);
  const table = document.getElementById('table');
  if(!items.length){ table.innerHTML='<p class="muted">vazio</p>'; return; }
  table.innerHTML = `<table class="site-table"><tr><th>Serial</th><th>Título</th><th>Status</th><th>%</th><th>Velocidade</th><th>Retry</th></tr>`+
    items.map(i=>{
      const p = i.progress || {};
      return `<tr><td>${Dashboard.esc(i.serial)}</td><td>${Dashboard.esc(i.title||i.serial)}</td><td>${statusBar(i)}</td><td class="pct">${i.status==='downloading'?(p.percent||0)+'%':'-'}</td><td class="speed">${Dashboard.esc(p.speed||'-')}</td><td>${i.retry_count||0}</td></tr>`;
    }).join('')+
    `</table>`;
}
render(); setInterval(render,3000);
</script>
</body>
</html>
