<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="/shared/dashboard.css">
<style>
.bar-wrap{position:relative;background:var(--bg3);border-radius:4px;height:22px;overflow:hidden;min-width:120px}
.bar-fill{position:absolute;top:0;left:0;height:100%;background:linear-gradient(90deg,var(--purple),var(--blue));transition:width .3s ease;opacity:.35}
.bar-text{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;height:100%;font-size:10px;font-weight:700;color:var(--txt);text-shadow:0 1px 2px rgba(0,0,0,.8)}
.pct{font-weight:800;color:var(--blue)}
.speed{color:var(--purple);font-weight:700}
</style>
</head>
<body>
<div class="widget">
  <div class="widget-header">Fila <span id="h-cnt"></span></div>
  <div class="widget-body">
    <div class="stat-grid" id="stats"></div>
    <h3 style="margin:10px 0 4px;color:var(--txt2);font-size:11px">Próximos</h3>
    <div id="table"></div>
  </div>
</div>
<script src="/shared/dashboard.js"></script>
<script>
function statusBar(i){
  const p = i.progress || {};
  const pct = p.percent || 0;
  const speed = p.speed || '';
  if(i.status==='downloading'){
    return `<div class="bar-wrap"><div class="bar-fill" style="width:${pct}%"></div><div class="bar-text">${i.status} ${pct}%</div></div>`;
  }
  return `<span class="status ${i.status}">${i.status}</span>`;
}
async function render(){
  const data = await Dashboard.fetchJSON('/status');
  const stats = document.getElementById('stats');
  document.getElementById('h-cnt').innerHTML = Dashboard.badge(data.total);
  stats.innerHTML = `
    <div class="stat"><div class="n">${data.pending||0}</div><div class="l">Pendentes</div></div>
    <div class="stat"><div class="n">${data.searching||0}</div><div class="l">Buscando</div></div>
    <div class="stat"><div class="n">${data.ready||0}</div><div class="l">Prontos</div></div>
    <div class="stat"><div class="n">${data.downloading||0}</div><div class="l">Downloads</div></div>
    <div class="stat"><div class="n" style="color:var(--green)">${data.completed||0}</div><div class="l">OK</div></div>
    <div class="stat"><div class="n" style="color:#f44336">${data.failed||0}</div><div class="l">Falhas</div></div>
  `;
  if(data.paused) stats.innerHTML += '<div class="stat" style="grid-column:1/-1"><div class="n" style="color:var(--yellow)">PAUSED</div></div>';

  const q = await Dashboard.fetchJSON('/queue');
  const items = (q.queue||[]).filter(i=>['pending','searching','ready','downloading'].includes(i.status)).slice(0,15);
  const table = document.getElementById('table');
  if(!items.length){ table.innerHTML='<p class="muted">vazio</p>'; return; }
  table.innerHTML = `<table><tr><th>Serial</th><th>Título</th><th>Status</th><th>%</th><th>Velocidade</th><th>Retry</th></tr>`+
    items.map(i=>{
      const p = i.progress || {};
      return `<tr><td>${Dashboard.esc(i.serial)}</td><td>${Dashboard.esc(i.title||i.serial)}</td><td>${statusBar(i)}</td><td class="pct">${i.status==='downloading'?(p.percent||0)+'%':'-'}</td><td class="speed">${Dashboard.esc(p.speed||'-')}</td><td>${i.retry_count||0}</td></tr>`;
    }).join('')+
    `</table>`;
}
render(); setInterval(render,3000);
</script>
</body>
</html>
