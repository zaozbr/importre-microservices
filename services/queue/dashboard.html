<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fila</title>
<link rel="stylesheet" href="https://unpkg.com/antd@5.20.0/dist/reset.css">
<link rel="stylesheet" href="https://unpkg.com/antd@5.20.0/dist/antd.min.css">
<style>
  body { background: #0d1117; color: #c9d1d9; padding: 12px; }
  .site-card { background: #161b22; border-color: #30363d; }
  .site-card .ant-card-head { background: #161b22; border-color: #30363d; color: #e94560; }
  .site-card .ant-card-body { background: #161b22; }
</style>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/antd@5.20.0/dist/antd.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const { Card, Table, Tag, Statistic, Row, Col, Progress } = antd;

async function fetchJSON(url) {
  try { const r = await fetch(url); return await r.json(); } catch (e) { return {}; }
}

const statusColors = {
  pending: 'default',
  searching: 'processing',
  ready: 'warning',
  downloading: 'success',
  completed: 'success',
  failed: 'error'
};

function App() {
  const [status, setStatus] = useState({});
  const [items, setItems] = useState([]);

  useEffect(() => {
    async function load() {
      const s = await fetchJSON('/status');
      setStatus(s);
      const q = await fetchJSON('/queue');
      const active = (q.queue || []).filter(i => ['pending', 'searching', 'ready', 'downloading'].includes(i.status)).slice(0, 50);
      setItems(active);
    }
    load();
    const i = setInterval(load, 3000);
    return () => clearInterval(i);
  }, []);

  const columns = [
    { title: 'Serial', dataIndex: 'serial', key: 'serial', render: s => <Tag color="blue">{s}</Tag> },
    { title: 'Jogo', dataIndex: 'title', key: 'title', ellipsis: true },
    { title: 'Status', dataIndex: 'status', key: 'status', render: s => <Tag color={statusColors[s] || 'default'}>{s}</Tag> },
    { title: 'Progresso', key: 'progress', render: (_, item) => {
      const p = item.progress || {};
      return item.status === 'downloading' ? <Progress percent={p.percent || 0} size="small" /> : '-';
    }},
    { title: 'Velocidade', key: 'speed', render: (_, item) => item.progress?.speed || '-' },
    { title: 'Retry', dataIndex: 'retry_count', key: 'retry', render: r => r || 0 },
  ];

  return (
    <Card title={`Fila: ${status.total || 0} itens`} className="site-card" bordered>
      <Row gutter={16} style={{ marginBottom: 16 }}>
        <Col><Statistic title="Pendentes" value={status.pending || 0} valueStyle={{ color: '#58a6ff' }} /></Col>
        <Col><Statistic title="Buscando" value={status.searching || 0} valueStyle={{ color: '#58a6ff' }} /></Col>
        <Col><Statistic title="Prontos" value={status.ready || 0} valueStyle={{ color: '#58a6ff' }} /></Col>
        <Col><Statistic title="Downloads" value={status.downloading || 0} valueStyle={{ color: '#58a6ff' }} /></Col>
        <Col><Statistic title="OK" value={status.completed || 0} valueStyle={{ color: '#3fb950' }} /></Col>
        <Col><Statistic title="Falhas" value={status.failed || 0} valueStyle={{ color: '#e94560' }} /></Col>
      </Row>
      <Table
        dataSource={items}
        columns={columns}
        rowKey="serial"
        size="small"
        pagination={false}
        scroll={{ y: 280 }}
        locale={{ emptyText: 'fila vazia' }}
      />
    </Card>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
