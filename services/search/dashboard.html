<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="/shared/dashboard.css">
<style>
.site-table{width:100%;border-collapse:collapse}
.site-table th,.site-table td{padding:5px 8px;text-align:left;border-bottom:1px solid var(--bg3);font-size:11px}
.site-table th{background:var(--bg3);color:var(--txt2);text-transform:uppercase;font-size:9px;position:sticky;top:0}
.site-table tr:hover{background:var(--bg3)}
</style>
</head>
<body>
<div class="widget">
  <div class="widget-body">
    <div id="status" class="muted"></div>
    <div id="table"></div>
  </div>
</div>
<script src="/shared/dashboard.js"></script>
<script>
async function render(){
  const data = await Dashboard.fetchJSON('/status');
  document.getElementById('status').textContent = (data.ok===false ? 'offline' : 'online') + ' | ' + (data.plugins||[]).length + ' plugins';

  const q = await Dashboard.fetchJSON('/queue-proxy');
  const items = (q.queue||[]).filter(i=>i.status==='searching').slice(0,50);
  const table = document.getElementById('table');
  if(!items.length){ table.innerHTML='<p class="muted">nenhuma busca ativa</p>'; return; }
  table.innerHTML = `<table class="site-table"><tr><th>Serial</th><th>Título</th><th>Site</th></tr>`+
    items.map(i=>{
      const src = (i.sources||[])[0]||{};
      return `<tr><td>${Dashboard.esc(i.serial)}</td><td>${Dashboard.esc(i.title||'-')}</td><td class="muted">${Dashboard.esc(src.site||'scanning')}</td></tr>`;
    }).join('')+
    `</table>`;
}
render(); setInterval(render,3000);
</script>
</body>
</html>
