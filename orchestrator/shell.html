<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Importre v4 — Micro-frontend Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;
  --txt:#c9d1d9;--txt2:#8b949e;--red:#e94560;--green:#3fb950;--yellow:#d29922;
  --blue:#58a6ff;--purple:#bc8cff;--orange:#f0883e;
}
body{font-family:'Segoe UI',system-ui,Arial,sans-serif;background:var(--bg);color:var(--txt)}
.hdr{position:fixed;top:0;left:0;right:0;z-index:1000;background:var(--bg2);border-bottom:2px solid var(--red);box-shadow:0 4px 20px rgba(0,0,0,.6);padding:8px 16px}
.hdr-r1,.hdr-r2{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.hdr-r2{margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.hdr-title{font-size:17px;font-weight:800;color:var(--red);letter-spacing:1px}
.hdr-spacer{flex:1}
.srv-status{padding:3px 10px;border-radius:5px;font-weight:700;font-size:10px}
.srv-on{background:#238636;color:#fff}
.srv-off{background:#da3633;color:#fff}
.ctrl-state{font-size:11px;font-weight:700;padding:4px 12px;border-radius:5px}
.st-running{border:1px solid var(--green);color:var(--green)}
.st-paused{border:1px solid var(--yellow);color:var(--yellow)}
.st-stopped{border:1px solid #da3633;color:#da3633}
.btn{padding:5px 12px;border:none;border-radius:5px;font-size:12px;font-weight:700;cursor:pointer}
.btn:hover{filter:brightness(1.25)}
.btn-go{background:#238636;color:#fff}
.btn-pause{background:var(--yellow);color:var(--bg)}
.btn-restart{background:var(--blue);color:var(--bg)}
.btn-stop{background:#da3633;color:#fff}
.hdr-update{font-size:10px;color:var(--txt2);margin-left:auto}
.stat-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;flex:1;min-width:280px;max-width:600px}
.stat{background:var(--bg);padding:5px 4px;border-radius:6px;text-align:center;border:1px solid var(--border)}
.stat .n{font-size:15px;font-weight:800;color:var(--blue)}
.stat .n.ok{color:var(--green)}
.stat .n.fail{color:#f44336}
.stat .l{font-size:8px;color:var(--txt2);text-transform:uppercase}
@media(max-width:900px){.stat-grid{grid-template-columns:repeat(3,1fr)}}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:120px 8px 8px;height:calc(100vh - 120px);grid-auto-rows:1fr}
.widget-frame{width:100%;height:100%;min-height:0;border:none;border-radius:8px;display:block}
.widget-frame.full{grid-column:1/-1}
.widget-frame.tall{grid-row:span 2}
.log{grid-column:1/-1;height:160px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px;font-family:Consolas,monospace;font-size:11px;overflow:auto;white-space:pre-wrap}
@media(max-width:900px){.grid{grid-template-columns:1fr;height:auto;grid-auto-rows:auto}.widget-frame{height:360px}.widget-frame.tall{grid-row:auto;height:480px}}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-r1">
    <div class="hdr-title">IMPORTRE v4 — Micro-frontends</div>
    <div class="srv-status srv-on" id="srv-status">SERVICES ONLINE</div>
    <div class="ctrl-state st-running" id="ctrl-state">RUNNING</div>
    <button class="btn btn-go" onclick="control('resume')">PLAY</button>
    <button class="btn btn-pause" onclick="control('pause')">PAUSE</button>
    <button class="btn btn-restart" onclick="control('restart')">RESTART</button>
    <button class="btn btn-stop" onclick="control('stop')">STOP</button>
    <button class="btn btn-go" onclick="reprocessFailures()" title="Reseta retry de falhas e move para o fim da fila">REPROCESSAR FALHAS</button>
    <div class="hdr-update" id="hdr-update">atualizando...</div>
  </div>
  <div class="hdr-r2">
    <div class="stat-grid" id="hdr-stats">
      <div class="stat"><div class="n">-</div><div class="l">Pendentes</div></div>
      <div class="stat"><div class="n">-</div><div class="l">Buscando</div></div>
      <div class="stat"><div class="n">-</div><div class="l">Prontos</div></div>
      <div class="stat"><div class="n">-</div><div class="l">Downloads</div></div>
      <div class="stat"><div class="n ok">-</div><div class="l">OK</div></div>
      <div class="stat"><div class="n fail">-</div><div class="l">Falhas</div></div>
    </div>
  </div>
</div>
<div class="grid">
  <iframe class="widget-frame full tall" id="wf-queue" src="http://127.0.0.1:9001/dashboard"></iframe>
  <iframe class="widget-frame full" id="wf-search" src="http://127.0.0.1:9002/dashboard"></iframe>
  <iframe class="widget-frame" id="wf-download" src="http://127.0.0.1:9003/dashboard"></iframe>
  <iframe class="widget-frame" id="wf-chd" src="http://127.0.0.1:9004/dashboard"></iframe>
  <div class="log" id="log"></div>
</div>
<script>
function control(action){
  const timeout = action === 'stop' || action === 'restart' ? 60000 : 15000;
  const controller = new AbortController();
  const t = setTimeout(()=>controller.abort(), timeout);
  fetch('/api/control/'+action, { signal: controller.signal })
    .then(async r=>{
      clearTimeout(t);
      const text = await r.text();
      let d = {};
      try { d = text ? JSON.parse(text) : {}; } catch(e) { throw new Error('Resposta invalida do servidor: ' + text.slice(0,200)); }
      if(!r.ok) throw new Error(d.error || ('HTTP ' + r.status));
      document.getElementById('ctrl-state').textContent = (d.state||'running').toUpperCase();
      document.getElementById('ctrl-state').className = 'ctrl-state st-'+(d.state||'running');
      if(d.result){
        const r = d.result;
        alert(`${action.toUpperCase()} OK\nServicos mortos: ${(r.killed||[]).join(', ')||'nenhum'}\nIn_progress limpos: ${r.cleaned||0}\nPortas livres: ${r.portsFree?'sim':'nao'}`);
      } else {
        alert(`${action.toUpperCase()} OK`);
      }
      loadStatus();
    })
    .catch(e=>{
      clearTimeout(t);
      alert('Falha no comando ' + action.toUpperCase() + ': ' + (e.name==='AbortError' ? 'timeout' : e.message));
    });
}
function reprocessFailures(){
  if(!confirm('Resetar falhas e colocar no fim da fila?')) return;
  const controller = new AbortController();
  const t = setTimeout(()=>controller.abort(), 15000);
  fetch('/api/reprocess-failures',{method:'POST', signal: controller.signal})
    .then(async r=>{
      clearTimeout(t);
      const text = await r.text();
      let d = {};
      try { d = text ? JSON.parse(text) : {}; } catch(e) { throw new Error('Resposta invalida do servidor: ' + text.slice(0,200)); }
      if(!r.ok) throw new Error(d.error || ('HTTP ' + r.status));
      alert(d.ok ? `${d.moved} falhas reprocessadas` : 'Erro: '+d.error);
      loadStatus();
    })
    .catch(e=>{
      clearTimeout(t);
      alert('Falha ao reprocessar falhas: ' + (e.name==='AbortError' ? 'timeout' : e.message));
    });
}
async function loadStatus(){
  try{
    const data = await fetch('/api/status').then(r=>r.json());
    const ok = !data.queue.error && !data.search.error && !data.download.error && !data.chd.error;
    document.getElementById('srv-status').textContent = ok?'SERVICES ONLINE':'SERVICES OFFLINE';
    document.getElementById('srv-status').className = 'srv-status '+(ok?'srv-on':'srv-off');
    document.getElementById('ctrl-state').textContent = (data.control||'running').toUpperCase();
    document.getElementById('ctrl-state').className = 'ctrl-state st-'+(data.control||'running');
    document.getElementById('hdr-update').textContent = 'atualizado '+new Date().toLocaleTimeString('pt-BR');
    const q = data.queue || {};
    const stats = document.getElementById('hdr-stats');
    if (stats) {
      stats.innerHTML = `
        <div class="stat"><div class="n">${q.pending||0}</div><div class="l">Pendentes</div></div>
        <div class="stat"><div class="n">${q.searching||0}</div><div class="l">Buscando</div></div>
        <div class="stat"><div class="n">${q.ready||0}</div><div class="l">Prontos</div></div>
        <div class="stat"><div class="n">${q.downloading||0}</div><div class="l">Downloads</div></div>
        <div class="stat"><div class="n ok">${q.completed||0}</div><div class="l">OK</div></div>
        <div class="stat"><div class="n fail">${q.failed||0}</div><div class="l">Falhas</div></div>
      `;
    }
  }catch(e){ console.error(e); }
}
async function loadLog(){
  try{
    const data = await fetch('/api/log').then(r=>r.json());
    document.getElementById('log').textContent = (data.lines||[]).join('\n');
  }catch(e){ console.error(e); }
}
loadStatus(); loadLog();
setInterval(loadStatus,3000);
setInterval(loadLog,5000);
</script>
</body>
</html>
