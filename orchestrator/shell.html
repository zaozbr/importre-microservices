<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Importre v4 — Dashboard</title>
<link rel="stylesheet" href="https://unpkg.com/antd@5.20.0/dist/reset.css">
<link rel="stylesheet" href="https://unpkg.com/antd@5.20.0/dist/antd.min.css">
<style>
  body { background: #0d1117; color: #c9d1d9; }
  .app-shell { min-height: 100vh; display: flex; flex-direction: column; }
  .site-layout { flex: 1; padding: 16px; overflow: auto; }
  .widget-card .ant-card-body { padding: 0; }
  .widget-frame { width: 100%; height: 450px; min-height: 450px; border: none; display: block; }
  .log-card .ant-card-body { padding: 8px; }
  .log { height: 180px; font-family: Consolas, monospace; font-size: 11px; overflow: auto; white-space: pre-wrap; background: #161b22; color: #c9d1d9; border-radius: 6px; padding: 8px; }
  .stat-value { font-size: 18px; font-weight: 700; color: #58a6ff; }
  .stat-value.ok { color: #3fb950; }
  .stat-value.fail { color: #e94560; }
  .header-bar { background: #161b22; border-bottom: 2px solid #e94560; padding: 8px 16px; position: sticky; top: 0; z-index: 1000; }
</style>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/antd@5.20.0/dist/antd.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const { Layout, Card, Button, Space, Row, Col, Statistic, Badge, Typography, Tag } = antd;
const { Header, Content } = Layout;
const { Title, Text } = Typography;

const widgets = [
  { id: 'wf-download', title: 'Downloads', url: 'http://127.0.0.1:9003/dashboard', span: 24 },
  { id: 'wf-queue', title: 'Fila', url: 'http://127.0.0.1:9001/dashboard', span: 12 },
  { id: 'wf-search', title: 'Busca', url: 'http://127.0.0.1:9002/dashboard', span: 12 },
  { id: 'wf-chd', title: 'Conversor CHD', url: 'http://127.0.0.1:9004/dashboard', span: 24 },
];

async function control(action) {
  const timeout = action === 'stop' || action === 'restart' ? 60000 : 15000;
  const controller = new AbortController();
  const t = setTimeout(() => controller.abort(), timeout);
  try {
    const r = await fetch('/api/control/' + action, { signal: controller.signal });
    const text = await r.text();
    let d = {};
    try { d = text ? JSON.parse(text) : {}; } catch(e) { throw new Error('Resposta invalida: ' + text.slice(0,200)); }
    if (!r.ok) throw new Error(d.error || ('HTTP ' + r.status));
    antd.message.success((d.state || action).toUpperCase() + ' OK');
  } catch (e) {
    antd.message.error('Falha: ' + (e.name === 'AbortError' ? 'timeout' : e.message));
  } finally {
    clearTimeout(t);
  }
}

async function reprocessFailures() {
  if (!window.confirm('Resetar falhas e colocar no fim da fila?')) return;
  const controller = new AbortController();
  const t = setTimeout(() => controller.abort(), 15000);
  try {
    const r = await fetch('/api/reprocess-failures', { method: 'POST', signal: controller.signal });
    const d = await r.json();
    antd.message.success(d.ok ? d.moved + ' falhas reprocessadas' : 'Erro: ' + d.error);
  } catch (e) {
    antd.message.error('Falha: ' + (e.name === 'AbortError' ? 'timeout' : e.message));
  } finally {
    clearTimeout(t);
  }
}

function App() {
  const [status, setStatus] = useState({});
  const [logs, setLogs] = useState([]);
  const [online, setOnline] = useState(true);
  const [controlState, setControlState] = useState('running');
  const [lastUpdate, setLastUpdate] = useState('');

  const q = status.queue || {};

  useEffect(() => {
    async function load() {
      try {
        const data = await fetch('/api/status').then(r => r.json());
        const ok = !data.queue.error && !data.search.error && !data.download.error && !data.chd.error;
        setOnline(ok);
        setControlState(data.control || 'running');
        setStatus(data);
        setLastUpdate(new Date().toLocaleTimeString('pt-BR'));
      } catch (e) { setOnline(false); }
    }
    async function loadLog() {
      try {
        const data = await fetch('/api/log').then(r => r.json());
        setLogs(data.lines || []);
      } catch (e) {}
    }
    load(); loadLog();
    const i1 = setInterval(load, 3000);
    const i2 = setInterval(loadLog, 5000);
    return () => { clearInterval(i1); clearInterval(i2); };
  }, []);

  const stateColor = controlState === 'running' ? 'success' : controlState === 'paused' ? 'warning' : 'error';

  return (
    <Layout className="app-shell">
      <Header className="header-bar">
        <Space direction="vertical" style={{ width: '100%' }} size="small">
          <Space wrap style={{ width: '100%', justifyContent: 'space-between' }}>
            <Space>
              <Title level={4} style={{ margin: 0, color: '#e94560' }}>IMPORTRE v4</Title>
              <Badge status={online ? 'success' : 'error'} text={online ? 'SERVICES ONLINE' : 'SERVICES OFFLINE'} />
              <Tag color={stateColor}>{controlState.toUpperCase()}</Tag>
            </Space>
            <Space>
              <Button type="primary" onClick={() => control('resume')}>PLAY</Button>
              <Button onClick={() => control('pause')}>PAUSE</Button>
              <Button onClick={() => control('restart')}>RESTART</Button>
              <Button danger onClick={() => control('stop')}>STOP</Button>
              <Button type="primary" onClick={reprocessFailures}>REPROCESSAR FALHAS</Button>
            </Space>
          </Space>
          <Row gutter={[16, 8]}>
            <Col><Statistic title="Pendentes" value={q.pending || 0} valueStyle={{ color: '#58a6ff' }} /></Col>
            <Col><Statistic title="Buscando" value={q.searching || 0} valueStyle={{ color: '#58a6ff' }} /></Col>
            <Col><Statistic title="Prontos" value={q.ready || 0} valueStyle={{ color: '#58a6ff' }} /></Col>
            <Col><Statistic title="Downloads" value={q.downloading || 0} valueStyle={{ color: '#58a6ff' }} /></Col>
            <Col><Statistic title="OK" value={q.completed || 0} valueStyle={{ color: '#3fb950' }} /></Col>
            <Col><Statistic title="Falhas" value={q.failed || 0} valueStyle={{ color: '#e94560' }} /></Col>
            <Col style={{ marginLeft: 'auto', display: 'flex', alignItems: 'flex-end' }}>
              <Text type="secondary">atualizado {lastUpdate}</Text>
            </Col>
          </Row>
        </Space>
      </Header>
      <Content className="site-layout">
        <Row gutter={[16, 16]}>
          {widgets.map(w => (
            <Col span={w.span} key={w.id}>
              <Card title={w.title} className="widget-card" bodyStyle={{ padding: 0 }}>
                <iframe id={w.id} className="widget-frame" src={w.url}></iframe>
              </Card>
            </Col>
          ))}
        </Row>
        <Card title="Log" className="log-card" style={{ marginTop: 16 }}>
          <div className="log">{logs.join('\n')}</div>
        </Card>
      </Content>
    </Layout>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
