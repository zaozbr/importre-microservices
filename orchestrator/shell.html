<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Importre v4 — Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;
  --txt:#c9d1d9;--txt2:#8b949e;--red:#e94560;--green:#3fb950;--yellow:#d29922;
  --blue:#58a6ff;--purple:#bc8cff;--orange:#f0883e;
}
body{font-family:'Segoe UI',system-ui,Arial,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}
.app{display:flex;flex-direction:column;min-height:100vh}
.header{position:sticky;top:0;z-index:1000;background:var(--bg2);border-bottom:2px solid var(--red);padding:10px 16px;box-shadow:0 4px 20px rgba(0,0,0,.6)}
.header-row1{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:10px}
.header-title{font-size:20px;font-weight:800;color:var(--red);letter-spacing:1px}
.badge{padding:4px 10px;border-radius:5px;font-weight:700;font-size:11px;color:#fff}
.badge.on{background:var(--green)}
.badge.off{background:#da3633}
.tag{padding:4px 10px;border-radius:5px;font-weight:700;font-size:11px;border:1px solid}
.tag.running{border-color:var(--green);color:var(--green)}
.tag.paused{border-color:var(--yellow);color:var(--yellow)}
.tag.stopped{border-color:#da3633;color:#da3633}
.btn{padding:6px 14px;border:none;border-radius:5px;font-size:12px;font-weight:700;cursor:pointer}
.btn:hover{filter:brightness(1.2)}
.btn-go{background:var(--green);color:#fff}
.btn-pause{background:var(--yellow);color:var(--bg)}
.btn-restart{background:var(--blue);color:#fff}
.btn-stop{background:#da3633;color:#fff}
.header-row2{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px 14px;min-width:90px;text-align:center}
.stat-card .n{font-size:20px;font-weight:800;color:var(--blue)}
.stat-card .n.ok{color:var(--green)}
.stat-card .n.fail{color:#f44336}
.stat-card .l{font-size:9px;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px}
.spacer{flex:1}
.update{font-size:10px;color:var(--txt2)}
.content{flex:1;padding:16px;display:flex;flex-direction:column;gap:16px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.card-header{padding:10px 14px;background:var(--bg3);border-bottom:1px solid var(--border);font-weight:700;color:var(--red);font-size:14px;display:flex;align-items:center;gap:8px}
.card-header .cnt{background:var(--bg);color:var(--txt2);font-size:10px;padding:2px 8px;border-radius:10px}
.card-body{padding:0;height:450px;min-height:450px}
.widget-frame{width:100%;height:100%;min-height:450px;border:none;display:block}
.log-card{margin-top:0}
.log-card .log{height:180px;padding:10px;font-family:Consolas,monospace;font-size:11px;overflow:auto;white-space:pre-wrap;color:var(--txt);background:var(--bg)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:900px){.grid-2{grid-template-columns:1fr}.content{padding:10px}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-row1">
      <div class="header-title">IMPORTRE v4</div>
      <div class="badge on" id="srv-status">SERVICES ONLINE</div>
      <div class="tag running" id="ctrl-state">RUNNING</div>
      <button class="btn btn-go" onclick="control('resume')">PLAY</button>
      <button class="btn btn-pause" onclick="control('pause')">PAUSE</button>
      <button class="btn btn-restart" onclick="control('restart')">RESTART</button>
      <button class="btn btn-stop" onclick="control('stop')">STOP</button>
      <button class="btn btn-go" onclick="reprocessFailures()">REPROCESSAR FALHAS</button>
      <div class="spacer"></div>
      <div class="update" id="hdr-update">atualizando...</div>
    </div>
    <div class="header-row2" id="hdr-stats">
      <div class="stat-card"><div class="n" id="st-pending">-</div><div class="l">Pendentes</div></div>
      <div class="stat-card"><div class="n" id="st-searching">-</div><div class="l">Buscando</div></div>
      <div class="stat-card"><div class="n" id="st-ready">-</div><div class="l">Prontos</div></div>
      <div class="stat-card"><div class="n" id="st-downloading">-</div><div class="l">Downloads</div></div>
      <div class="stat-card"><div class="n ok" id="st-completed">-</div><div class="l">OK</div></div>
      <div class="stat-card"><div class="n fail" id="st-failed">-</div><div class="l">Falhas</div></div>
    </div>
  </div>
  <div class="content">
    <div class="card">
      <div class="card-header">Downloads <span class="cnt" id="h-download">0</span></div>
      <div class="card-body">
        <iframe class="widget-frame" src="http://127.0.0.1:9003/dashboard"></iframe>
      </div>
    </div>
    <div class="grid-2">
      <div class="card">
        <div class="card-header">Fila <span class="cnt" id="h-queue">0</span></div>
        <div class="card-body">
          <iframe class="widget-frame" src="http://127.0.0.1:9001/dashboard"></iframe>
        </div>
      </div>
      <div class="card">
        <div class="card-header">Busca <span class="cnt" id="h-search">0</span></div>
        <div class="card-body">
          <iframe class="widget-frame" src="http://127.0.0.1:9002/dashboard"></iframe>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-header">Conversão CHD <span class="cnt" id="h-chd">0</span></div>
      <div class="card-body">
        <iframe class="widget-frame" src="http://127.0.0.1:9004/dashboard"></iframe>
      </div>
    </div>
    <div class="card log-card">
      <div class="card-header">Log</div>
      <div class="card-body">
        <div class="log" id="log"></div>
      </div>
    </div>
  </div>
</div>
<script>
function control(action){
  const timeout = action === 'stop' || action === 'restart' ? 60000 : 15000;
  const controller = new AbortController();
  const t = setTimeout(()=>controller.abort(), timeout);
  fetch('/api/control/'+action, { signal: controller.signal })
    .then(async r=>{
      clearTimeout(t);
      const text = await r.text();
      let d = {};
      try { d = text ? JSON.parse(text) : {}; } catch(e) { throw new Error('Resposta invalida: '+text.slice(0,200)); }
      if(!r.ok) throw new Error(d.error || ('HTTP '+r.status));
      document.getElementById('ctrl-state').textContent = (d.state||'running').toUpperCase();
      document.getElementById('ctrl-state').className = 'tag st-'+(d.state||'running');
      alert(action.toUpperCase()+' OK');
      loadStatus();
    })
    .catch(e=>{
      clearTimeout(t);
      alert('Falha: '+(e.name==='AbortError'?'timeout':e.message));
    });
}
function reprocessFailures(){
  if(!confirm('Resetar falhas e colocar no fim da fila?')) return;
  const controller = new AbortController();
  const t = setTimeout(()=>controller.abort(), 15000);
  fetch('/api/reprocess-failures',{method:'POST', signal: controller.signal})
    .then(async r=>{
      clearTimeout(t);
      const d = await r.json();
      alert(d.ok ? d.moved+' falhas reprocessadas' : 'Erro: '+d.error);
      loadStatus();
    })
    .catch(e=>{
      clearTimeout(t);
      alert('Falha: '+(e.name==='AbortError'?'timeout':e.message));
    });
}
async function loadStatus(){
  try{
    const data = await fetch('/api/status').then(r=>r.json());
    const ok = !data.queue.error && !data.search.error && !data.download.error && !data.chd.error;
    document.getElementById('srv-status').textContent = ok?'SERVICES ONLINE':'SERVICES OFFLINE';
    document.getElementById('srv-status').className = 'badge '+(ok?'on':'off');
    document.getElementById('ctrl-state').textContent = (data.control||'running').toUpperCase();
    document.getElementById('ctrl-state').className = 'tag '+(data.control||'running');
    document.getElementById('hdr-update').textContent = 'atualizado '+new Date().toLocaleTimeString('pt-BR');
    const q = data.queue || {};
    document.getElementById('st-pending').textContent = q.pending||0;
    document.getElementById('st-searching').textContent = q.searching||0;
    document.getElementById('st-ready').textContent = q.ready||0;
    document.getElementById('st-downloading').textContent = q.downloading||0;
    document.getElementById('st-completed').textContent = q.completed||0;
    document.getElementById('st-failed').textContent = q.failed||0;
    document.getElementById('h-download').textContent = data.download.active||0;
    document.getElementById('h-queue').textContent = q.total||0;
    document.getElementById('h-search').textContent = data.search.active||0;
    document.getElementById('h-chd').textContent = (data.chd.converting||[]).length||0;
  }catch(e){ console.error(e); }
}
async function loadLog(){
  try{
    const data = await fetch('/api/log').then(r=>r.json());
    document.getElementById('log').textContent = (data.lines||[]).join('\n');
  }catch(e){ console.error(e); }
}
loadStatus(); loadLog();
setInterval(loadStatus,3000);
setInterval(loadLog,5000);
</script>
</body>
</html>
